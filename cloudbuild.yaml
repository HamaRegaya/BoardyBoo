# ── Cloud Build config for backend — triggered by deploy.sh or manually ──────
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/boardyboo-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/boardyboo-backend:latest'
      - './backend'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/boardyboo-backend:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/boardyboo-backend:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'boardyboo-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/boardyboo-backend:$SHORT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '3600'
      - '--session-affinity'

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/boardyboo-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/boardyboo-backend:latest'
